<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lumina CMS - Yönetim Paneli ve Blog</title>
  <meta name="description" content="Lumina CMS ile içeriklerinizi modern, hızlı ve güvenli bir şekilde yönetin.">
  <!-- Google Fonts (Outfit) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    /* Design Tokens */
    :root {
      --bg-base: #0b0f19;
      --bg-surface: #151c2c;
      --bg-card: rgba(26, 35, 54, 0.65);
      --bg-card-hover: rgba(35, 47, 72, 0.85);
      --border-color: rgba(255, 255, 255, 0.08);
      --border-focus: rgba(99, 102, 241, 0.5);
      
      --color-primary: #6366f1;
      --color-primary-hover: #4f46e5;
      --color-success: #10b981;
      --color-danger: #ef4444;
      --color-warning: #f59e0b;
      
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --text-inverse: #ffffff;
      
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.3), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
      
      --font-sans: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-base);
      color: var(--text-main);
      font-family: var(--font-sans);
      min-height: 100vh;
      overflow-x: hidden;
      line-height: 1.6;
    }

    /* Background Gradients & Glow Effects */
    .glow-bg {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.12) 0%, rgba(99, 102, 241, 0) 70%);
      top: -200px;
      right: -200px;
      z-index: -1;
      pointer-events: none;
    }

    .glow-bg-left {
      position: fixed;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(16, 185, 129, 0.08) 0%, rgba(16, 185, 129, 0) 70%);
      bottom: -100px;
      left: -100px;
      z-index: -1;
      pointer-events: none;
    }

    /* Main App Layout */
    .app-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem 2rem;
      border-bottom: 1px solid var(--border-color);
      background: rgba(21, 28, 44, 0.8);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-weight: 700;
      font-size: 1.5rem;
      color: var(--text-main);
      text-decoration: none;
      letter-spacing: -0.5px;
    }

    .logo i {
      color: var(--color-primary);
      text-shadow: 0 0 15px rgba(99, 102, 241, 0.6);
    }

    .logo span {
      background: linear-gradient(135deg, var(--text-main) 30%, var(--text-muted) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      font-family: var(--font-sans);
      font-weight: 500;
      font-size: 0.95rem;
      padding: 0.625rem 1.25rem;
      border-radius: 8px;
      border: 1px solid transparent;
      cursor: pointer;
      transition: var(--transition-smooth);
      text-decoration: none;
      color: var(--text-main);
    }

    .btn-primary {
      background-color: var(--color-primary);
      box-shadow: 0 4px 14px rgba(99, 102, 241, 0.4);
    }

    .btn-primary:hover {
      background-color: var(--color-primary-hover);
      transform: translateY(-1px);
    }

    .btn-secondary {
      background-color: transparent;
      border-color: var(--border-color);
    }

    .btn-secondary:hover {
      background-color: rgba(255, 255, 255, 0.05);
      border-color: var(--text-muted);
    }

    .btn-danger {
      background-color: var(--color-danger);
      box-shadow: 0 4px 14px rgba(239, 68, 68, 0.3);
    }

    .btn-danger:hover {
      background-color: #dc2626;
      transform: translateY(-1px);
    }

    /* Container & Layout */
    .container {
      max-width: 1200px;
      margin: 2.5rem auto;
      padding: 0 1.5rem;
    }

    /* Page Views */
    .view-section {
      display: none;
      animation: fadeIn 0.4s ease-out forwards;
    }

    .view-section.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Search and Filters */
    .search-bar-container {
      margin-bottom: 2rem;
      position: relative;
    }

    .search-input {
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      padding: 0.875rem 1rem 0.875rem 3rem;
      border-radius: 12px;
      color: var(--text-main);
      font-size: 1rem;
      outline: none;
      transition: var(--transition-smooth);
      backdrop-filter: blur(8px);
    }

    .search-input:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.25);
    }

    .search-bar-container i {
      position: absolute;
      left: 1.25rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
    }

    /* Cards Grid */
    .posts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 2rem;
    }

    .post-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      height: 100%;
      transition: var(--transition-smooth);
      backdrop-filter: blur(8px);
      position: relative;
      overflow: hidden;
    }

    .post-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: linear-gradient(90deg, var(--color-primary), var(--color-success));
      opacity: 0;
      transition: var(--transition-smooth);
    }

    .post-card:hover {
      background: var(--bg-card-hover);
      transform: translateY(-5px);
      box-shadow: var(--shadow-lg);
      border-color: rgba(99, 102, 241, 0.2);
    }

    .post-card:hover::before {
      opacity: 1;
    }

    .post-card-date {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .post-card-title {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
      color: var(--text-main);
      line-height: 1.3;
    }

    .post-card-summary {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-bottom: 1.5rem;
      flex-grow: 1;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Modal Styling */
    .modal-backdrop {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(11, 15, 25, 0.85);
      backdrop-filter: blur(8px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: var(--transition-smooth);
    }

    .modal-backdrop.show {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      width: 100%;
      max-width: 500px;
      border-radius: 16px;
      padding: 2.5rem;
      box-shadow: var(--shadow-lg);
      transform: scale(0.95);
      transition: var(--transition-smooth);
      position: relative;
    }

    .modal-backdrop.show .modal {
      transform: scale(1);
    }

    .modal-close {
      position: absolute;
      top: 1.25rem;
      right: 1.25rem;
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 1.25rem;
      cursor: pointer;
      transition: var(--transition-smooth);
    }

    .modal-close:hover {
      color: var(--text-main);
    }

    .modal-title {
      font-size: 1.75rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    /* Form Fields */
    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-group label {
      display: block;
      font-size: 0.9rem;
      font-weight: 500;
      margin-bottom: 0.5rem;
      color: var(--text-muted);
    }

    .form-control {
      width: 100%;
      background: rgba(11, 15, 25, 0.5);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      color: var(--text-main);
      font-family: var(--font-sans);
      font-size: 0.95rem;
      outline: none;
      transition: var(--transition-smooth);
    }

    .form-control:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
    }

    textarea.form-control {
      resize: vertical;
      min-height: 120px;
    }

    /* Toast Notifications */
    .toast-container {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      z-index: 2000;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .toast {
      background: var(--bg-surface);
      border-left: 4px solid var(--color-primary);
      padding: 1rem 1.5rem;
      border-radius: 8px;
      box-shadow: var(--shadow-lg);
      display: flex;
      align-items: center;
      gap: 0.75rem;
      transform: translateX(120%);
      transition: var(--transition-smooth);
      max-width: 350px;
    }

    .toast.show {
      transform: translateX(0);
    }

    .toast.success {
      border-left-color: var(--color-success);
    }

    .toast.error {
      border-left-color: var(--color-danger);
    }

    /* Admin Management Section */
    .admin-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border-color);
    }

    .admin-title {
      font-size: 1.8rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    /* Admin List Table */
    .table-container {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      overflow: hidden;
      backdrop-filter: blur(8px);
      margin-bottom: 2rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }

    th {
      background: rgba(11, 15, 25, 0.4);
      padding: 1rem 1.5rem;
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border-color);
    }

    td {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border-color);
      font-size: 0.95rem;
    }

    tr:last-child td {
      border-bottom: none;
    }

    tr:hover td {
      background: rgba(255, 255, 255, 0.02);
    }

    .actions-cell {
      display: flex;
      gap: 0.5rem;
    }

    .btn-icon {
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-muted);
      padding: 0.5rem;
      border-radius: 6px;
      cursor: pointer;
      transition: var(--transition-smooth);
    }

    .btn-icon:hover {
      color: var(--text-main);
      border-color: var(--text-muted);
    }

    .btn-icon.edit:hover {
      color: var(--color-primary);
      border-color: rgba(99, 102, 241, 0.4);
      background: rgba(99, 102, 241, 0.1);
    }

    .btn-icon.delete:hover {
      color: var(--color-danger);
      border-color: rgba(239, 68, 68, 0.4);
      background: rgba(239, 68, 68, 0.1);
    }

    /* Single Post View Detail */
    .post-detail-container {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 3rem;
      backdrop-filter: blur(8px);
    }

    .post-detail-meta {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .post-detail-title {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      line-height: 1.25;
    }

    .post-detail-summary {
      font-size: 1.15rem;
      color: var(--text-muted);
      line-height: 1.6;
      border-left: 4px solid var(--color-primary);
      padding-left: 1.5rem;
      margin-bottom: 2rem;
    }

    .post-detail-content {
      font-size: 1.1rem;
      line-height: 1.8;
      color: var(--text-main);
    }

    .post-detail-content p {
      margin-bottom: 1.5rem;
    }

    .post-detail-back {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--color-primary);
      text-decoration: none;
      font-weight: 500;
      margin-bottom: 2rem;
      transition: var(--transition-smooth);
      cursor: pointer;
    }

    .post-detail-back:hover {
      color: var(--color-primary-hover);
      transform: translateX(-4px);
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 5rem 2rem;
      color: var(--text-muted);
    }

    .empty-state i {
      font-size: 3.5rem;
      margin-bottom: 1.5rem;
      color: var(--color-primary);
      opacity: 0.5;
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 3rem 0;
      border-top: 1px solid var(--border-color);
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-top: 4rem;
    }

    footer i {
      color: var(--color-danger);
    }
  </style>
</head>
<body>

  <div class="glow-bg"></div>
  <div class="glow-bg-left"></div>

  <!-- Application Header -->
  <header class="app-header">
    <a href="#" class="logo" onclick="app.navigateTo('blog-list')">
      <i class="fa-solid fa-cube"></i>
      <span>Lumina CMS</span>
    </a>
    <div class="nav-actions">
      <button class="btn btn-secondary" id="admin-action-btn" onclick="app.handleAuthButton()">
        <i class="fa-solid fa-lock"></i>
        <span>Yönetici Girişi</span>
      </button>
    </div>
  </header>

  <!-- Core Page Wrapper -->
  <main class="container">

    <!-- VIEW 1: PUBLIC BLOG POSTS LIST -->
    <section id="view-blog-list" class="view-section active">
      <div class="search-bar-container">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="blog-search" class="search-input" placeholder="İçeriklerde arayın..." oninput="app.filterPosts(this.value)">
      </div>
      
      <div id="posts-container" class="posts-grid">
        <!-- Dynmically loaded posts cards -->
      </div>
    </section>

    <!-- VIEW 2: POST DETAILED PAGE -->
    <section id="view-post-detail" class="view-section">
      <span class="post-detail-back" onclick="app.navigateTo('blog-list')">
        <i class="fa-solid fa-arrow-left"></i> Geri Dön
      </span>
      <div id="post-detail-container" class="post-detail-container">
        <!-- Dynamically loaded post detail -->
      </div>
    </section>

    <!-- VIEW 3: ADMIN MANAGEMENT SYSTEM -->
    <section id="view-admin-dashboard" class="view-section">
      <div class="admin-bar">
        <h2 class="admin-title">
          <i class="fa-solid fa-gauge-high"></i>
          Yönetici Paneli
        </h2>
        <button class="btn btn-primary" onclick="app.openEditorModal()">
          <i class="fa-solid fa-plus"></i> Yeni Yazı Ekle
        </button>
      </div>

      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Başlık</th>
              <th>Özet</th>
              <th>Yayın Tarihi</th>
              <th style="width: 120px;">İşlemler</th>
            </tr>
          </thead>
          <tbody id="admin-table-body">
            <!-- Dynamically populated management rows -->
          </tbody>
        </table>
      </div>
    </section>

  </main>

  <!-- Login Modal -->
  <div class="modal-backdrop" id="login-modal-backdrop">
    <div class="modal">
      <button class="modal-close" onclick="app.closeLoginModal()"><i class="fa-solid fa-xmark"></i></button>
      <h3 class="modal-title">
        <i class="fa-solid fa-shield-halved"></i>
        Yönetici Girişi
      </h3>
      <form id="login-form" onsubmit="app.submitLogin(event)">
        <div class="form-group">
          <label for="login-username">Kullanıcı Adı</label>
          <input type="text" id="login-username" class="form-control" placeholder="Örn: admin" required autocomplete="username">
        </div>
        <div class="form-group">
          <label for="login-password">Şifre</label>
          <input type="password" id="login-password" class="form-control" placeholder="Örn: admin123" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Giriş Yap</button>
      </form>
    </div>
  </div>

  <!-- Post Editor Modal (Create/Edit) -->
  <div class="modal-backdrop" id="editor-modal-backdrop">
    <div class="modal" style="max-width: 650px;">
      <button class="modal-close" onclick="app.closeEditorModal()"><i class="fa-solid fa-xmark"></i></button>
      <h3 class="modal-title" id="editor-modal-title">
        <i class="fa-solid fa-pen-to-square"></i>
        Yazı Ekle/Düzenle
      </h3>
      <form id="editor-form" onsubmit="app.submitPost(event)">
        <input type="hidden" id="editor-post-id">
        <div class="form-group">
          <label for="editor-title">Başlık</label>
          <input type="text" id="editor-title" class="form-control" placeholder="Yazı başlığını yazın..." required>
        </div>
        <div class="form-group">
          <label for="editor-summary">Özet</label>
          <input type="text" id="editor-summary" class="form-control" placeholder="Yazının kısa bir özetini yazın..." required>
        </div>
        <div class="form-group">
          <label for="editor-content">İçerik (HTML destekli)</label>
          <textarea id="editor-content" class="form-control" placeholder="Yazı içeriğinizi HTML biçiminde veya düz metin olarak girin..." required></textarea>
        </div>
        <div style="display: flex; gap: 1rem; justify-content: flex-end; margin-top: 1.5rem;">
          <button type="button" class="btn btn-secondary" onclick="app.closeEditorModal()">İptal</button>
          <button type="submit" class="btn btn-primary" id="editor-submit-btn">Kaydet</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Toast Notification System -->
  <div class="toast-container" id="toast-container"></div>

  <footer>
    <p>&copy; 2026 Lumina CMS. <i class="fa-solid fa-heart"></i> ile tasarlandı.</p>
  </footer>

  <script src="/app.js"></script>
</body>
</html>
